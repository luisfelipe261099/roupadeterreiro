<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 520" role="img" aria-labelledby="title desc">
  <title id="title">Logo Atelier Roupas de Terreiro</title>
  <desc id="desc">Logo circular com vestido e tesoura em tons de lilas e vermelho.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#2b2a2f"/>
      <stop offset="1" stop-color="#1a1a1f"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e9e9"/>
    </linearGradient>
    <linearGradient id="scissor" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#8a63ba"/>
      <stop offset="1" stop-color="#d12634"/>
    </linearGradient>
    <path id="curve" d="M 95 270 A 165 165 0 0 1 295 95"/>
  </defs>

  <circle cx="260" cy="260" r="248" fill="url(#bg)" stroke="#f5f5f5" stroke-width="8"/>
  <circle cx="260" cy="260" r="220" fill="none" stroke="#a6a0ad" stroke-dasharray="7 8" stroke-width="4"/>

  <text font-family="Montserrat, Arial, sans-serif" font-size="28" fill="#ffffff" letter-spacing="1">
    <textPath href="#curve">Atelier de Roupas de Terreiro</textPath>
  </text>

  <path d="M260 137 L305 180 L305 222 L365 308 Q270 348 155 308 L215 222 L215 180 Z" fill="url(#dress)"/>
  <path d="M260 137 L305 180 L260 195 L215 180 Z" fill="#2f2f35"/>

  <rect x="335" y="175" width="76" height="18" rx="5" fill="#f2c0c7" transform="rotate(34 335 175)"/>
  <rect x="357" y="210" width="70" height="16" rx="5" fill="#f5cf94" transform="rotate(24 357 210)"/>

  <circle cx="343" cy="354" r="19" fill="none" stroke="url(#scissor)" stroke-width="8"/>
  <circle cx="379" cy="354" r="19" fill="none" stroke="url(#scissor)" stroke-width="8"/>
  <path d="M343 340 L418 256" stroke="#c6d6f1" stroke-width="8" stroke-linecap="round"/>
  <path d="M379 340 L438 270" stroke="#d9e5ff" stroke-width="8" stroke-linecap="round"/>
</svg>
